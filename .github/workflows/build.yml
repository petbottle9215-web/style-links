name: Build Signed AAB

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17 (Required by Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Project and Capacitor
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Style Link" "com.ceakle.stylelink" --web-dir=www
        npx cap add android
        
    - name: Fix Gradle Build Errors Automatically
      run: |
        cd android
        echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        chmod +x gradlew

    - name: Sync Web Assets
      run: npx cap sync android

    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore release.keystore -alias stylelink -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=StyleLink, OU=Salon, O=Ceakle, L=Lahore, S=Punjab, C=PK"

    - name: Build Android App Bundle (AAB)
      run: |
        cd android
        ./gradlew bundleRelease --no-daemon --stacktrace

    - name: Sign AAB File Safely
      run: |
        jarsigner -keystore release.keystore -storepass 123456 -keypass 123456 android/app/build/outputs/bundle/release/app-release.aab stylelink

    - name: Upload Signed AAB
      uses: actions/upload-artifact@v4
      with:
        name: Signed-AAB-File
        path: android/app/build/outputs/bundle/release/app-release.aab
